<!DOCTYPE html>
<html lang="en">
<head>
  <title>Navbar</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <!-- JS (for toggle) -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body {
      padding-top: 70px;
    }
  </style>
</head>

<body>

<!-- 1. Basic Navbar -->
<nav class="navbar navbar-expand-md bg-dark navbar-dark fixed-top">
  <a class="navbar-brand" href="#">MySite</a>

  <!-- Toggle button -->
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#nav1">
    <span class="navbar-toggler-icon"></span>
  </button>

  <!-- Links -->
  <div class="collapse navbar-collapse" id="nav1">
    <ul class="navbar-nav ml-auto">
      <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
      <li class="nav-item"><a class="nav-link" href="#">About</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
    </ul>
  </div>
</nav>

<div class="container text-center">
  <h2>Navbar Demo</h2>
  <p>Scroll and resize screen to see responsive navbar.</p>
</div>

<hr>

<!-- 2. Colored Navbar -->
<nav class="navbar navbar-expand-md bg-primary navbar-dark">
  <a class="navbar-brand" href="#">Color Nav</a>
</nav>

<hr>

<!-- 3. Light Navbar -->
<nav class="navbar navbar-expand-md bg-light navbar-light">
  <a class="navbar-brand" href="#">Light Nav</a>
</nav>

<hr>

<!-- 4. Navbar with Form -->
<nav class="navbar navbar-expand-md bg-dark navbar-dark">
  <a class="navbar-brand" href="#">Search</a>

  <form class="form-inline ml-auto">
    <input class="form-control mr-sm-2" type="text" placeholder="Search">
    <button class="btn btn-success">Search</button>
  </form>
</nav>

<hr>

<!-- 5. Navbar with Dropdown -->
<nav class="navbar navbar-expand-md bg-secondary navbar-dark">
  <a class="navbar-brand" href="#">Menu</a>

  <ul class="navbar-nav ml-auto">
    <li class="nav-item dropdown">
      <a class="nav-link dropdown-toggle" data-toggle="dropdown" href="#">
        Options
      </a>
      <div class="dropdown-menu">
        <a class="dropdown-item" href="#">Profile</a>
        <a class="dropdown-item" href="#">Settings</a>
      </div>
    </li>
  </ul>
</nav>

</body>
</html>
